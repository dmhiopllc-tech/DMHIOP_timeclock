<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Payroll - Time Entry Editing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .details-row {
            display: none;
            background-color: #f9fafb;
        }
        .details-row.expanded {
            display: table-row;
        }
        .expandable-row {
            cursor: pointer;
        }
        .expandable-row:hover {
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    
    <div class="max-w-7xl mx-auto">
        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b">
                <h3 class="text-lg font-bold text-gray-800 mb-4">
                    <i class="fas fa-dollar-sign mr-2"></i>PayChex Payroll Export with Time Entry Editing
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Pay Period</label>
                        <select id="payroll-period" class="w-full border rounded px-3 py-2" onchange="loadPayrollPreview()">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Start Date</label>
                        <input type="date" id="payroll-start" class="w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                        <input type="date" id="payroll-end" class="w-full border rounded px-3 py-2">
                    </div>
                </div>
                <div class="mt-4 flex space-x-4">
                    <button onclick="loadPayrollPreview()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">
                        <i class="fas fa-eye mr-2"></i>Preview
                    </button>
                    <button onclick="exportPayrollCSV()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg">
                        <i class="fas fa-download mr-2"></i>Export CSV
                    </button>
                </div>
            </div>
            <div class="p-6">
                <div id="payroll-preview">
                    <p class="text-gray-600">Select a pay period to preview payroll data...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Time Entry Modal -->
    <div id="editTimeModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h3 class="text-lg font-bold mb-4">Edit Time Entry</h3>
            <form id="editTimeForm" onsubmit="return saveTimeEdit(event)">
                <input type="hidden" id="edit-entry-id">
                <input type="hidden" id="edit-user-id">
                <div class="mb-4">
                    <p class="font-semibold" id="edit-employee-name"></p>
                    <p class="text-sm text-gray-600" id="edit-employee-email"></p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Clock In Time</label>
                        <input type="datetime-local" id="edit-clock-in" class="w-full border rounded px-3 py-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Clock Out Time</label>
                        <input type="datetime-local" id="edit-clock-out" class="w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Reason for Change</label>
                        <textarea id="edit-reason" class="w-full border rounded px-3 py-2" rows="3" required placeholder="e.g., Forgot to clock out, incorrect time recorded, supervisor adjustment"></textarea>
                    </div>
                </div>
                <div class="mt-6 flex space-x-3">
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded">
                        Save Changes
                    </button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 py-2 rounded">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://dgfzrkbgrzenukjelnjl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZnpya2JncnplbnVramVsbmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc5MTIwODMsImV4cCI6MjA1MzQ4ODA4M30.N-K8r3Z8nPLgcFAZkM7RYxU_i2g-x0CcF3PvUqTdqdo';
        const adminClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentEditEntry = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadPayPeriods();
        });

        async function checkAuth() {
            const { data: { user }, error } = await adminClient.auth.getUser();
            if (!user || error) {
                alert('Please login to access the admin dashboard');
                window.location.href = 'login-standalone.html';
                return;
            }
            currentUser = user;
        }

        async function loadPayPeriods() {
            try {
                const { data: periods, error } = await adminClient
                    .from('pay_periods')
                    .select('*')
                    .order('start_date', { ascending: false });

                if (error) throw error;

                const select = document.getElementById('payroll-period');
                select.innerHTML = '<option value="">Select a pay period...</option>';
                
                periods.forEach(period => {
                    const option = document.createElement('option');
                    option.value = period.id;
                    option.dataset.start = period.start_date;
                    option.dataset.end = period.end_date;
                    const startDate = new Date(period.start_date).toLocaleDateString();
                    const endDate = new Date(period.end_date).toLocaleDateString();
                    option.textContent = `${startDate} - ${endDate}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading pay periods:', error);
            }
        }

        async function loadPayrollPreview() {
            const periodSelect = document.getElementById('payroll-period');
            const selectedOption = periodSelect.options[periodSelect.selectedIndex];
            
            if (!selectedOption.value) return;

            const startDate = selectedOption.dataset.start;
            const endDate = selectedOption.dataset.end;

            document.getElementById('payroll-start').value = startDate;
            document.getElementById('payroll-end').value = endDate;

            try {
                // Get aggregated payroll data
                const { data: payrollData, error } = await adminClient
                    .rpc('get_paychex_payroll', {
                        p_start_date: startDate,
                        p_end_date: endDate
                    });

                if (error) throw error;

                if (!payrollData || payrollData.length === 0) {
                    document.getElementById('payroll-preview').innerHTML = '<p class="text-gray-600">No payroll data for this period</p>';
                    return;
                }

                // For each employee, also get their individual time entries
                const detailedData = await Promise.all(payrollData.map(async (row) => {
                    const { data: entries, error: entriesError } = await adminClient
                        .from('time_entries')
                        .select('*, users!time_entries_user_id_fkey(full_name, email)')
                        .eq('user_id', row.employee_id)
                        .gte('clock_in', startDate)
                        .lte('clock_in', endDate)
                        .order('clock_in', { ascending: true });

                    if (entriesError) console.error('Error fetching entries:', entriesError);
                    return {
                        ...row,
                        timeEntries: entries || []
                    };
                }));

                // Build HTML
                let html = `
                    <div class="mb-4 p-4 bg-blue-50 border border-blue-200 rounded">
                        <p class="text-sm text-blue-800">
                            <i class="fas fa-info-circle mr-2"></i>
                            <strong>Click on any employee row</strong> to view and edit individual time entries
                        </p>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                `;
                
                html += `
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">
                                <i class="fas fa-chevron-down mr-1"></i>Name
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Regular</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">OT</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">PTO</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sick</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Entries</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                `;

                let totalHours = 0;
                detailedData.forEach((row, index) => {
                    const empId = `emp-${index}`;
                    html += `
                        <tr class="expandable-row" onclick="toggleDetails('${empId}')">
                            <td class="px-4 py-3 whitespace-nowrap">
                                <i class="fas fa-chevron-right mr-2 text-gray-400" id="${empId}-icon"></i>
                                <strong>${row.employee_name}</strong>
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm">${row.email}</td>
                            <td class="px-4 py-3 whitespace-nowrap font-mono">${(row.regular_hours || 0).toFixed(2)}</td>
                            <td class="px-4 py-3 whitespace-nowrap font-mono">${(row.overtime_hours || 0).toFixed(2)}</td>
                            <td class="px-4 py-3 whitespace-nowrap font-mono">${(row.pto_hours || 0).toFixed(2)}</td>
                            <td class="px-4 py-3 whitespace-nowrap font-mono">${(row.sick_hours || 0).toFixed(2)}</td>
                            <td class="px-4 py-3 whitespace-nowrap font-mono font-bold">${(row.total_payable_hours || 0).toFixed(2)}</td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs bg-gray-100 rounded-full">${row.timeEntries.length} entries</span>
                            </td>
                        </tr>
                        <tr class="details-row" id="${empId}">
                            <td colspan="8" class="px-4 py-3">
                                <div class="ml-8 mr-4">
                                    <h4 class="font-semibold mb-2 text-sm text-gray-700">Individual Time Entries:</h4>
                                    ${buildTimeEntriesTable(row.timeEntries, row.employee_id, row.employee_name, row.email)}
                                </div>
                            </td>
                        </tr>
                    `;
                    totalHours += parseFloat(row.total_payable_hours || 0);
                });

                html += `
                    <tr class="bg-gray-50 font-bold">
                        <td colspan="6" class="px-4 py-3 text-right">TOTAL:</td>
                        <td class="px-4 py-3 font-mono">${totalHours.toFixed(2)}</td>
                        <td></td>
                    </tr>
                `;

                html += '</tbody></table></div>';
                document.getElementById('payroll-preview').innerHTML = html;

            } catch (error) {
                console.error('Error loading payroll preview:', error);
                document.getElementById('payroll-preview').innerHTML = '<p class="text-red-600">Error loading payroll data</p>';
            }
        }

        function buildTimeEntriesTable(entries, userId, userName, userEmail) {
            if (entries.length === 0) {
                return '<p class="text-sm text-gray-500 italic">No time entries for this period</p>';
            }

            let html = '<table class="min-w-full text-sm border border-gray-200 rounded">';
            html += `
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-3 py-2 text-left">Clock In</th>
                        <th class="px-3 py-2 text-left">Clock Out</th>
                        <th class="px-3 py-2 text-left">Hours</th>
                        <th class="px-3 py-2 text-left">Status</th>
                        <th class="px-3 py-2 text-right">Action</th>
                    </tr>
                </thead>
                <tbody>
            `;

            entries.forEach(entry => {
                const clockIn = new Date(entry.clock_in);
                const clockOut = entry.clock_out ? new Date(entry.clock_out) : null;
                const hours = clockOut ? ((clockOut - clockIn) / (1000 * 60 * 60)).toFixed(2) : 'In progress';
                
                html += `
                    <tr class="border-t">
                        <td class="px-3 py-2">${clockIn.toLocaleString()}</td>
                        <td class="px-3 py-2">${clockOut ? clockOut.toLocaleString() : '<span class="text-yellow-600">Still clocked in</span>'}</td>
                        <td class="px-3 py-2 font-mono">${hours}</td>
                        <td class="px-3 py-2">
                            ${entry.clock_out 
                                ? '<span class="px-2 py-1 text-xs bg-green-100 text-green-800 rounded">Complete</span>' 
                                : '<span class="px-2 py-1 text-xs bg-yellow-100 text-yellow-800 rounded">In Progress</span>'}
                        </td>
                        <td class="px-3 py-2 text-right">
                            <button 
                                onclick='editTimeEntry(${JSON.stringify({
                                    id: entry.id,
                                    user_id: userId,
                                    user_name: userName,
                                    user_email: userEmail,
                                    clock_in: entry.clock_in,
                                    clock_out: entry.clock_out
                                })})' 
                                class="text-blue-600 hover:text-blue-800 text-xs font-semibold">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            return html;
        }

        function toggleDetails(empId) {
            const detailsRow = document.getElementById(empId);
            const icon = document.getElementById(`${empId}-icon`);
            
            if (detailsRow.classList.contains('expanded')) {
                detailsRow.classList.remove('expanded');
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-right');
            } else {
                detailsRow.classList.add('expanded');
                icon.classList.remove('fa-chevron-right');
                icon.classList.add('fa-chevron-down');
            }
        }

        function editTimeEntry(entry) {
            currentEditEntry = entry;
            
            // Populate the form
            document.getElementById('edit-entry-id').value = entry.id;
            document.getElementById('edit-user-id').value = entry.user_id;
            document.getElementById('edit-employee-name').textContent = entry.user_name;
            document.getElementById('edit-employee-email').textContent = entry.user_email;
            
            // Format datetime for datetime-local input (YYYY-MM-DDTHH:mm)
            const clockIn = new Date(entry.clock_in);
            const clockInStr = clockIn.toISOString().slice(0, 16);
            document.getElementById('edit-clock-in').value = clockInStr;
            
            if (entry.clock_out) {
                const clockOut = new Date(entry.clock_out);
                const clockOutStr = clockOut.toISOString().slice(0, 16);
                document.getElementById('edit-clock-out').value = clockOutStr;
            } else {
                document.getElementById('edit-clock-out').value = '';
            }
            
            // Clear the reason field
            document.getElementById('edit-reason').value = '';
            
            // Show the modal
            document.getElementById('editTimeModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editTimeModal').classList.add('hidden');
            currentEditEntry = null;
        }

        async function saveTimeEdit(event) {
            event.preventDefault();
            
            if (!currentEditEntry) {
                alert('Error: No entry selected');
                return false;
            }
            
            const entryId = document.getElementById('edit-entry-id').value;
            const newClockIn = document.getElementById('edit-clock-in').value;
            const newClockOut = document.getElementById('edit-clock-out').value;
            const reason = document.getElementById('edit-reason').value;
            
            if (!reason.trim()) {
                alert('Please provide a reason for the change');
                return false;
            }
            
            try {
                // Insert audit trail FIRST
                const { error: auditError } = await adminClient
                    .from('time_entry_audit')
                    .insert({
                        time_entry_id: entryId,
                        admin_id: currentUser.id,
                        adjustment_reason: reason,
                        original_clock_in: currentEditEntry.clock_in,
                        original_clock_out: currentEditEntry.clock_out,
                        new_clock_in: newClockIn,
                        new_clock_out: newClockOut || null
                    });
                
                if (auditError) {
                    console.error('Audit error:', auditError);
                    throw auditError;
                }
                
                // Update the time entry
                const updateData = {
                    clock_in: newClockIn,
                    updated_at: new Date().toISOString()
                };
                
                if (newClockOut) {
                    updateData.clock_out = newClockOut;
                }
                
                const { error: updateError } = await adminClient
                    .from('time_entries')
                    .update(updateData)
                    .eq('id', entryId);
                
                if (updateError) {
                    console.error('Update error:', updateError);
                    throw updateError;
                }
                
                alert('✅ Time entry updated successfully!\n\n✓ Audit trail recorded\n✓ Payroll will reflect the new hours');
                closeEditModal();
                
                // Refresh the payroll preview
                loadPayrollPreview();
                
            } catch (error) {
                console.error('Error saving time edit:', error);
                alert('❌ Error saving changes: ' + error.message);
            }
            
            return false;
        }

        async function exportPayrollCSV() {
            const startDate = document.getElementById('payroll-start').value;
            const endDate = document.getElementById('payroll-end').value;

            if (!startDate || !endDate) {
                alert('Please select a pay period first');
                return;
            }

            try {
                const { data: payrollData, error } = await adminClient
                    .rpc('get_paychex_payroll', {
                        p_start_date: startDate,
                        p_end_date: endDate
                    });

                if (error) throw error;

                if (!payrollData || payrollData.length === 0) {
                    alert('No payroll data to export');
                    return;
                }

                // Create CSV
                let csv = 'Employee Name,Email,Regular Hours,Overtime Hours,PTO Hours,Sick Hours,Total Hours\n';
                payrollData.forEach(row => {
                    csv += `"${row.employee_name}","${row.email}",${row.regular_hours || 0},${row.overtime_hours || 0},${row.pto_hours || 0},${row.sick_hours || 0},${row.total_payable_hours || 0}\n`;
                });

                // Download CSV
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `paychex_payroll_${startDate}_to_${endDate}.csv`;
                a.click();

                alert('✅ Payroll CSV exported successfully!');
                
                // Log the export
                await adminClient.from('payroll_exports').insert({
                    admin_id: currentUser.id,
                    start_date: startDate,
                    end_date: endDate,
                    employee_count: payrollData.length,
                    total_hours: payrollData.reduce((sum, row) => sum + parseFloat(row.total_payable_hours || 0), 0)
                });

            } catch (error) {
                console.error('Error exporting payroll:', error);
                alert('❌ Error exporting payroll: ' + error.message);
            }
        }
    </script>
</body>
</html>
